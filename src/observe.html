<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles/play.css" />
        <link rel="stylesheet" href="styles/cmu.css" />
        <link rel="stylesheet" href="styles/p.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" integrity="sha384-5TcZemv2l/9On385z///+d7MSYlvIEw9FuZTIdZ14vJLqWphw7e7ZPuOiCHJcFCP" crossorigin="anonymous" />
        <link id="favicon" rel="icon" href="assets/alarmgreen.svg" />
        <title>Countdown Observer</title>
    </head>
    <body>
        <main id="main">
            <div id="waiting">
                <h1 class="header" style="text-align: center;">
                    The countdown round will begin momentarily.
                </h1>
                <div style="text-align: center; margin-top: 20px;">
                    <button id="fullscreenbutton" onclick="document.documentElement.requestFullscreen();this.style.display='none'">
                        Enter fullscreen
                    </button>
                </div>
            </div>
            <div id="timer"><div id="progress"></div></div>
            <div id="questions" class="pwrapper">
                <div id="questions_inner" class="p"></div>
            </div>
            <div id="vsbar">
                <div class="competitor left" id="p1">
                    <div class="competitior_name" id="p1name"></div>
                    <div class="competitor_bars">
                        <div class="bar bar1" id="bar11"></div>
                        <div class="bar bar1" id="bar12"></div>
                        <div class="bar bar1" id="bar13"></div>
                    </div>
                </div>
                <div class="middle">VS.</div>
                <div class="competitor right" id="p2">
                    <div class="competitior_name" id="p2name"></div>
                    <div class="competitor_bars">
                        <div class="bar bar1" id="bar23"></div>
                        <div class="bar bar1" id="bar22"></div>
                        <div class="bar bar1" id="bar21"></div>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <div class="left">COUNTDOWN</div>
            <div class="right">
                <div id="name">OBSERVER VIEW</div>
                <div id="status">AUTHENTICATING WITH SERVER</div>
            </div>
        </footer>

        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" integrity="sha384-cMkvdD8LoxVzGF/RPUKAcvmm49FQ0oxwDF3BGKtDXcEc+T1b2N+teh/OJfpU0jr6" crossorigin="anonymous"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js" integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXiTIIAmQqnlLlh" crossorigin="anonymous"></script>
        <script src="/socket.io/socket.io.js"></script>
        <script src="scripts/observe.js" type="module"></script>
        <script src="scripts/utils.js" defer></script>
    </body>
</html>
