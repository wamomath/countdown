<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDR Converter</title>

    <link id="favicon" rel="icon" href="assets/logo.png">
    <style>
        textarea { width: 100%; height: 150px; margin-bottom: 10px; font-family: monospace; }
        main { max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <section>
        <main>
            <h1>CDR Converter</h1>
            <textarea id="input" placeholder="Paste your Overleaf code here..."></textarea>
            <br>
            <button id="convert" onclick="convert()">Convert</button>
            <br>
            <textarea id="output" placeholder="JSON output will appear here..."></textarea>
        </main>
    </section>
    <script>
        function convert(){
            let inputText = document.getElementById("input").value.trim();
            if (!inputText) return;
            
            let linelist = inputText.split(/\n\s*\n/);
            let jsonlist = [];

            for (let i = 0; i < linelist.length; i++) {
                if (!linelist[i].trim()) continue;

                let parts = linelist[i].split(/(?<!\\)%/);
                
                let prob = parts[0].trim();
                if (prob.startsWith("\\item")) {
                    prob = prob.slice(5).trim();
                }

                let ans = parts.slice(1).join("%").trim();

                jsonlist.push({"statement": prob, "timeMS": 45000});
                jsonlist.push({"statement": "Answer: " + ans, "timeMS": 0});
            }
            
            document.getElementById("output").value = JSON.stringify(jsonlist, null, 4);
        }
    </script>
</body>
</html>
